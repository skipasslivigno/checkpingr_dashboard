kind = "mobile"
previewPath = "/"
title = "Ski Area Dashboard"
version = "1.0.0"
id = "artifacts/skiarea-dashboard"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 22599

[services.development]
run = "pnpm --filter @workspace/skiarea-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skiarea-dashboard", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/skiarea-dashboard", "run", "serve" ]

[services.env]
PORT = "22599"
BASE_PATH = "/"
